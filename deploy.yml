# GitHub Actions: Automatisches Deployment auf GitHub Pages
# K9: Webauftritt automatisiert öffentlich veröffentlichen

name: Deploy ForexGuide to GitHub Pages

on:
  push:
    branches:
      - main   # Wird ausgelöst bei jedem Push auf den main-Branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Alle Dateien im Root-Ordner werden hochgeladen

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
